services:
  - type: web
    name: starry-whisper
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: starry-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_BASE
        sync: false

databases:
  - name: starry-db
    plan: free
